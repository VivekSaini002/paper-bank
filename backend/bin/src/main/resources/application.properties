# ========================================
# Server Configuration
# ========================================
server.port=8080

# ========================================
# MySQL Database Configuration
# ========================================
spring.datasource.url=jdbc:mysql://localhost:3306/paperbank?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# JPA / Hibernate Configuration
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================================
# File Upload Configuration
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# JWT Configuration
# ========================================
app.jwt.secret=PaperBankSecretKeyForJWTAuth2024SuperSecureLongKeyThatIsAtLeast256BitsLong!!
app.jwt.expiration=86400000

# ========================================
# File Storage Configuration
# ========================================
app.upload.dir=./uploads

# ========================================
# OpenAI API Configuration
# ========================================
openai.api.key=${OPENAI_API_KEY:sk-your-api-key-here}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.model=gpt-4o
